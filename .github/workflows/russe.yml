name: Otomatik M3U ve JSON Güncelleyici

on:
  schedule:
    - cron: '0 */12 * * *' # Her 12 saatte bir otomatik çalışır
  workflow_dispatch: # Actions sekmesinden manuel olarak tetikleme imkanı verir

permissions:
  contents: write # GITHUB_TOKEN için depoya yazma (push) izni

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v3

      - name: Python Ortamını Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Scraping Kodunu Çalıştır
        run: python scraper.py

      - name: Değişiklikleri Commit Et ve Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Yeni dosyaları git dizinine ekle
          git add playlist.m3u playlist.json
          
          # Eğer dosyalarda bir değişiklik varsa commit et
          git diff --quiet && git diff --staged --quiet || (git commit -m "Otomatik güncelleme: M3U ve JSON oynatma listesi" && git push)
