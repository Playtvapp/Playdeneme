name: Tizam M3U/JSON Oynatma Listesi Güncelleyici

on:
  schedule:
    - cron: '0 */6 * * *' # Her 6 saatte bir (günde 4 kez) otomatik çalıştır
  workflow_dispatch: # İhtiyaç duyduğunda GitHub Actions üzerinden manuel tetikle

permissions:
  contents: write # Botun m3u ve json dosyalarını repoya yazabilmesi için GEREKLİ yazma izni

jobs:
  scrape-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Klonla (Checkout)
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Kazıma (Scraper) Kodunu Çalıştır
        run: python scraper.py

      - name: Değişiklikleri (M3U & JSON) Git Reposuna Yükle (Commit & Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u playlist.json
          
          # Dosyalarda değişiklik yoksa hata vermemesi için mantıksal operatör kullanıyoruz
          git diff --quiet && git diff --staged --quiet || (git commit -m "Oynatma listesi otomatik güncellendi [M3U & JSON]" && git push)
